<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Night Planner</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>🎬 Movie Night Planner</h1>
    <p>Keep track of movies you want to watch.</p>

    <div class="form-section">
      <input type="text" id="movieTitle" placeholder="Enter movie title" />

      <select id="movieGenre">
        <option value="Action">Action</option>
        <option value="Adventure">Adventure</option>
        <option value="Animation">Animation</option>
        <option value="Comedy">Comedy</option>
        <option value="Crime">Crime</option>
        <option value="Documentary">Documentary</option>
        <option value="Drama">Drama</option>
        <option value="Fantasy">Fantasy</option>
        <option value="Historical">Historical</option>
        <option value="Horror">Horror</option>
        <option value="Mystery">Mystery</option>
        <option value="Romance">Romance</option>
        <option value="Sci-Fi">Sci-Fi</option>
        <option value="Thriller">Thriller</option>
        <option value="War">War</option>
        <option value="Western">Western</option>
        <option value="Other">Other</option>
      </select>

      <input type="number" id="movieYear" placeholder="Year" min="1888" max="2100" />

      <input type="text" id="moviePoster" placeholder="Poster image URL" />

      <select id="movieRating">
        <option value="">Rating</option>
        <option value="1">⭐</option>
        <option value="2">⭐⭐</option>
        <option value="3">⭐⭐⭐</option>
        <option value="4">⭐⭐⭐⭐</option>
        <option value="5">⭐⭐⭐⭐⭐</option>
      </select>

      <button id="addMovieBtn">Add Movie</button>
    </div>

    <div class="filter-section">
      <input type="text" id="searchInput" placeholder="Search movies..." />

      <select id="statusFilter">
        <option value="all">All Movies</option>
        <option value="watched">Watched</option>
        <option value="unwatched">Unwatched</option>
      </select>

      <select id="ratingSort">
        <option value="none">Sort by Rating</option>
        <option value="high">Highest Rated First</option>
        <option value="low">Lowest Rated First</option>
      </select>
    </div>

    <ul id="movieList"></ul>
  </div>

  <script src="app.js"></script>
</body>
</html>
